services:

  postgres:
    image: postgres:15
    container_name: poetry-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poetry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate
    container_name: poetry-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@postgres:5432/poetry?sslmode=disable",
      "up"
    ]

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: poetry-backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/poetry?sslmode=disable
      JWT_SECRET: supersecret
      PORT: 8080
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: poetry-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
