version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: poetry-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poetry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    container_name: poetry-migrate
    depends_on:
      - postgres
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@postgres:5432/poetry?sslmode=disable",
      "up"
    ]

  backend:
    build: .
    container_name: poetry-backend
    depends_on:
      - postgres
      - migrate
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/poetry?sslmode=disable
      JWT_SECRET: supersecret
      PORT: 8080

volumes:
  pgdata: